<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    
    <main>
      <div id="brush-cursor"></div>
      <canvas id="canvas"></canvas>

      <div class="floating-island top-island">
        <div class="tool-group">
          <div class="brush-preview-wrap">
            <div class="brush-preview" id="brush-preview"></div>
          </div>
          <div class="brush-size-wrap">
            <input type="range" id="brush-size" min="1" max="60" value="5" />
            <span class="brush-size-val" id="brush-size-val">5px</span>
          </div>
        </div>
        <div class="divider"></div>
        <div style="display: flex; gap: 8px;">
          <button class="tool-btn active" id="brush-btn" aria-label="Brush Tool">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
          </button>
          <button class="tool-btn" id="eraser-btn" aria-label="Eraser Tool">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20H20V20Z"></path>
              <path d="M16 8L10 14"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="floating-island bottom-palette">
        <div class="color-grid" id="color-panel"></div>
      </div>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
